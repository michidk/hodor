<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  {% if not disable_default_css %}<style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 20px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    p {
      margin: 0 0 20px;
      color: #d4d4d4;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #d4d4d4;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #111111;
      color: #f5f5f5;
      font: inherit;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #ffffff;
      color: #000000;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      {% if not show_error %}display: none;{% endif %}
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(248, 113, 113, 0.25);
      background: rgba(127, 29, 29, 0.35);
      color: #f87171;
    }
  </style>{% endif %}
  {% if custom_css %}<style>{{ custom_css | safe }}</style>{% endif %}
</head>
<body>
  <main class="card">
    <h1>{{ title }}</h1>
    <p>Create your password to finish setting up this hodor instance.</p>
    <div class="error">{{ error_message }}</div>
    <form method="post" action="/_gate/login">
      <input type="hidden" name="redirect" value="/">
      <label for="bootstrap_token">Bootstrap token</label>
      <input id="bootstrap_token" name="bootstrap_token" type="password" autocomplete="one-time-code" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" autofocus required>
      <label for="password_confirm">Confirm password</label>
      <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required>
      <button type="submit">Set password</button>
    </form>
  </main>
  <script>
    const redirect = document.querySelector('input[name="redirect"]');
    if (redirect) {
      redirect.value = `${window.location.pathname}${window.location.search}${window.location.hash}` || '/';
    }
  </script>
</body>
</html>
