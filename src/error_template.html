<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }
    .eyebrow {
      margin: 0 0 12px;
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    p {
      margin: 0;
      color: #d4d4d4;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 12px 14px;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: inherit;
      text-decoration: none;
      font-weight: 600;
      background: #111111;
    }
    a.primary {
      background: #ffffff;
      color: #000000;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">{{ status_code }}</p>
    <h1>{{ heading }}</h1>
    <p>{{ message }}</p>
    <div class="actions">
      <a class="primary" href="/">Back to login</a>
    </div>
  </main>
</body>
</html>
